name: TeeOne booking (scheduled)

on:
  workflow_dispatch:
    inputs:
      skip_madrid_time_wait:
        description: "Run immediately without waiting for 19:59 / 20:00 Europe/Madrid (for testing)"
        type: boolean
        default: true
  schedule:
    # Europe/Madrid: cron is when GitHub *queues* the workflow, not when a
    # runner starts. On ubuntu-latest, starts are often ~30–60 minutes later
    # (capacity), so a 19:50 cron can begin ~20:20–20:30 local — that is delay,
    # not a broken timezone (19:50 Madrid ≈ 17:50 UTC; observed ~18:29 UTC).
    #
    # Schedule earlier so queue + checkout/build still land before ~20:00 when
    # the Java app submits. Tune if your runs still start too early/late.
    - cron: "0 19 * * *"
      timezone: "Europe/Madrid"

concurrency:
  group: teeone-booking-scheduled
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Write credentials files (.env + Google service account JSON)
        shell: bash
        env:
          # TeeOne
          TEEONE_USERNAME: ${{ secrets.TEEONE_USERNAME }}
          TEEONE_PASSWORD: ${{ secrets.TEEONE_PASSWORD }}

          # Google Sheets
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_RANGE: ${{ secrets.GOOGLE_SHEET_RANGE }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

          # Email
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_SSL: ${{ secrets.EMAIL_SMTP_SSL }}
          EMAIL_SMTP_STARTTLS: ${{ secrets.EMAIL_SMTP_STARTTLS }}
        run: |
          set -euo pipefail

          mkdir -p credentials logs

          # Write Google service-account JSON from secret.
          python3 - <<'PY'
          import os, pathlib
          p = pathlib.Path("credentials/google-service-account.json")
          s = os.environ.get("GOOGLE_CREDENTIALS_JSON", "")
          if not s.strip():
              raise SystemExit("Missing secret: GOOGLE_CREDENTIALS_JSON")
          p.write_text(s, encoding="utf-8")
          PY

          # Create a runtime .env file (ephemeral on the runner).
          # We write it via Python to preserve special characters safely and avoid printing secrets.
          python3 - <<'PY'
          import os, pathlib
          def req(k: str) -> str:
              v = os.environ.get(k, "")
              if not v.strip():
                  raise SystemExit(f"Missing secret: {k}")
              return v
          def opt(k: str) -> str:
              return os.environ.get(k, "")

          env_text = "\n".join([
              f"TEEONE_USERNAME={req('TEEONE_USERNAME')}",
              f"TEEONE_PASSWORD={req('TEEONE_PASSWORD')}",
              "",
              "GOOGLE_CREDENTIALS_PATH=./credentials/google-service-account.json",
              f"GOOGLE_SHEET_ID={req('GOOGLE_SHEET_ID')}",
              # Range is optional; if empty, Config falls back to Sheet1!A:Z
              *( [f"GOOGLE_SHEET_RANGE={opt('GOOGLE_SHEET_RANGE')}"] if opt('GOOGLE_SHEET_RANGE').strip() else [] ),
              "",
              f"EMAIL_FROM={req('EMAIL_FROM')}",
              f"EMAIL_PASSWORD={req('EMAIL_PASSWORD')}",
              f"EMAIL_TO={req('EMAIL_TO')}",
              f"EMAIL_SMTP_HOST={req('EMAIL_SMTP_HOST')}",
              f"EMAIL_SMTP_PORT={req('EMAIL_SMTP_PORT')}",
              f"EMAIL_SMTP_SSL={req('EMAIL_SMTP_SSL')}",
              f"EMAIL_SMTP_STARTTLS={req('EMAIL_SMTP_STARTTLS')}",
              "",
          ])

          pathlib.Path(".env").write_text(env_text, encoding="utf-8")
          PY

      - name: Build fat jar
        shell: bash
        run: |
          set -euo pipefail
          mvn -q clean package assembly:single

      - name: Run booking
        shell: bash
        env:
          # If you want extra logs, set these in repo secrets/vars:
          HEADLESS: "true"
          # Manual runs: honor workflow checkbox. Scheduled runs: always wait for Madrid window.
          SKIP_MADRID_TIME_WAIT: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_madrid_time_wait && 'true' || 'false' }}
        run: |
          set -euo pipefail
          java -jar target/teeone-booking-jar-with-dependencies.jar

