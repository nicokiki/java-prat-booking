name: TeeOne booking (scheduled)

on:
  workflow_dispatch:
    inputs:
      skip_madrid_time_wait:
        description: "Run immediately without waiting for 19:59 / 20:00 Europe/Madrid (for testing)"
        type: boolean
        default: true
      target_date_offset_days:
        description: "Days from today for sheet row + URL when Fecha is empty (scheduled runs always use 2)"
        type: choice
        options:
          - "2"
          - "1"
          - "0"
        default: "2"
  schedule:
    # Queue early: ubuntu-latest often assigns a runner 1–2h after cron. The job
    # then sleeps until 19:35 Europe/Madrid before mvn + jar (see wait step). The
    # Java app still waits until 19:59:20 / 20:00:02 for login and form fill.
    - cron: "0 17 * * *"
      timezone: "Europe/Madrid"

concurrency:
  group: teeone-booking-scheduled
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    # Scheduled runs may idle until 19:35 Madrid, then build + ~20:00 booking window.
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Setup Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Write credentials files (.env + Google service account JSON)
        shell: bash
        env:
          # TeeOne
          TEEONE_USERNAME: ${{ secrets.TEEONE_USERNAME }}
          TEEONE_PASSWORD: ${{ secrets.TEEONE_PASSWORD }}

          # Google Sheets
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_RANGE: ${{ secrets.GOOGLE_SHEET_RANGE }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}

          # Email
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_SMTP_SSL: ${{ secrets.EMAIL_SMTP_SSL }}
          EMAIL_SMTP_STARTTLS: ${{ secrets.EMAIL_SMTP_STARTTLS }}
        run: |
          set -euo pipefail

          mkdir -p credentials logs

          # Write Google service-account JSON from secret.
          python3 - <<'PY'
          import os, pathlib
          p = pathlib.Path("credentials/google-service-account.json")
          s = os.environ.get("GOOGLE_CREDENTIALS_JSON", "")
          if not s.strip():
              raise SystemExit("Missing secret: GOOGLE_CREDENTIALS_JSON")
          p.write_text(s, encoding="utf-8")
          PY

          # Create a runtime .env file (ephemeral on the runner).
          # We write it via Python to preserve special characters safely and avoid printing secrets.
          python3 - <<'PY'
          import os, pathlib
          def req(k: str) -> str:
              v = os.environ.get(k, "")
              if not v.strip():
                  raise SystemExit(f"Missing secret: {k}")
              return v
          def opt(k: str) -> str:
              return os.environ.get(k, "")

          env_text = "\n".join([
              f"TEEONE_USERNAME={req('TEEONE_USERNAME')}",
              f"TEEONE_PASSWORD={req('TEEONE_PASSWORD')}",
              "",
              "GOOGLE_CREDENTIALS_PATH=./credentials/google-service-account.json",
              f"GOOGLE_SHEET_ID={req('GOOGLE_SHEET_ID')}",
              # Range is optional; if empty, Config falls back to Sheet1!A:Z
              *( [f"GOOGLE_SHEET_RANGE={opt('GOOGLE_SHEET_RANGE')}"] if opt('GOOGLE_SHEET_RANGE').strip() else [] ),
              "",
              f"EMAIL_FROM={req('EMAIL_FROM')}",
              f"EMAIL_PASSWORD={req('EMAIL_PASSWORD')}",
              f"EMAIL_TO={req('EMAIL_TO')}",
              f"EMAIL_SMTP_HOST={req('EMAIL_SMTP_HOST')}",
              f"EMAIL_SMTP_PORT={req('EMAIL_SMTP_PORT')}",
              f"EMAIL_SMTP_SSL={req('EMAIL_SMTP_SSL')}",
              f"EMAIL_SMTP_STARTTLS={req('EMAIL_SMTP_STARTTLS')}",
              "",
          ])

          pathlib.Path(".env").write_text(env_text, encoding="utf-8")
          PY

      - name: Wait until pre-build window (Europe/Madrid)
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import time
          from datetime import datetime
          from zoneinfo import ZoneInfo

          madrid = ZoneInfo("Europe/Madrid")
          now = datetime.now(madrid)
          target = now.replace(hour=19, minute=35, second=0, microsecond=0)
          if now >= target:
              print(f"Already at/after pre-build window ({now:%H:%M:%S} >= {target:%H:%M:%S} Madrid)")
          else:
              seconds = (target - now).total_seconds()
              print(f"Sleeping {seconds:.0f}s until {target:%H:%M:%S} Europe/Madrid")
              time.sleep(seconds)
              print("Pre-build window reached")
          PY

      - name: Abort if runner is too late for 20:00 booking
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from datetime import datetime, time
          from zoneinfo import ZoneInfo

          madrid = ZoneInfo("Europe/Madrid")
          now = datetime.now(madrid)
          deadline = time(19, 57, 0)
          if now.time() > deadline:
              raise SystemExit(
                  f"Runner started too late for booking: now={now:%H:%M:%S} Madrid, "
                  f"deadline={deadline:%H:%M:%S} (need time to build + hit 19:59:20 driver window)"
              )
          print(f"OK to build and run ({now:%H:%M:%S} Madrid <= {deadline:%H:%M:%S})")
          PY

      - name: Build fat jar
        shell: bash
        run: |
          set -euo pipefail
          mvn -q clean package assembly:single

      - name: Run booking
        shell: bash
        env:
          # If you want extra logs, set these in repo secrets/vars:
          HEADLESS: "true"
          # Manual runs: honor workflow checkbox. Scheduled runs: always wait for Madrid window.
          SKIP_MADRID_TIME_WAIT: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_madrid_time_wait && 'true' || 'false' }}
          # Manual: choice 0/1/2. Scheduled: always 2 (same as previous hard-coded behavior).
          BOOKING_TARGET_DATE_OFFSET_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.target_date_offset_days || '2' }}
        run: |
          set -euo pipefail
          java -jar target/teeone-booking-jar-with-dependencies.jar

